services:
  - type: web
    name: prahari-backend
    env: python
    buildCommand: pip install -r prahari_dashboard_backend/requirements.txt
    startCommand: cd prahari_dashboard_backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: USERS_DB_PATH
        value: /var/data/users.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
